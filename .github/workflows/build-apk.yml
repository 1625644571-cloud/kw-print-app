name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Create www directory
        run: |
          mkdir -p www
          cp index.html www/index.html
          cp app.js www/app.js
          cp printer.js www/printer.js
          cp printer_detong.js www/printer_detong.js

      - name: Add Android Platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Add BLE Permissions to AndroidManifest
        run: |
          python3 << 'EOF'
          import re

          manifest_path = "android/app/src/main/AndroidManifest.xml"
          with open(manifest_path, "r") as f:
              content = f.read()

          permissions = """    <uses-permission android:name="android.permission.BLUETOOTH" />
              <uses-permission android:name="android.permission.BLUETOOTH_ADMIN" />
              <uses-permission android:name="android.permission.BLUETOOTH_SCAN" />
              <uses-permission android:name="android.permission.BLUETOOTH_CONNECT" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-feature android:name="android.hardware.bluetooth_le" android:required="true" />
          """

          if "BLUETOOTH_SCAN" not in content:
              content = content.replace(
                  "<manifest ",
                  permissions + "    <manifest ",
                  1
              )
              # 如果上面没替换成功，在<application前插入
              if "BLUETOOTH_SCAN" not in content:
                  content = content.replace(
                      "    <application",
                      permissions + "    <application",
                      1
                  )

          with open(manifest_path, "w") as f:
              f.write(content)

          print("AndroidManifest.xml updated successfully")
          with open(manifest_path, "r") as f:
              print(f.read())
          EOF

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kw-print-app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
